{% extends 'base.html' %}
{% block title %}Delete Newsletter — NewsApp{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;margin:0 auto;">
    <h2>Delete Newsletter</h2>
    <p style="margin:1rem 0;">Are you sure you want to delete <strong>"{{ object.title }}"</strong>? This cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'newsletter_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
